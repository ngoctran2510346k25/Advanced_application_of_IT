<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ôn 398 câu Tin học văn phòng</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap');

  :root{
    --paper:#eef1f5;
    --surface:#ffffff;
    --surface-2:#f6f8fb;
    --ink:#1b2430;
    --muted:#5c6b7a;
    --line:#e2e7ee;
    --word:#2b579a;
    --excel:#217346;
    --access:#a4373a;
    --khac:#5c6b7a;
    --accent:#2d4a8a;
    --ok:#1e8e5a;
    --okbg:#e7f5ee;
    --bad:#c0392b;
    --badbg:#fbeceb;
    --shadow:0 1px 2px rgba(27,36,48,.06),0 8px 24px rgba(27,36,48,.07);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Be Vietnam Pro',system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 64px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .hide{display:none!important}

  /* Header */
  .top{display:flex;align-items:center;gap:12px;margin:6px 2px 20px}
  .logo{
    width:40px;height:40px;border-radius:11px;flex:none;
    background:linear-gradient(135deg,var(--word),var(--access));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:18px;
    box-shadow:var(--shadow);
  }
  .top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:-.01em}
  .top p{font-size:12.5px;margin:1px 0 0;color:var(--muted);font-weight:500}

  /* Dashboard */
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .overall{padding:20px;display:flex;align-items:center;gap:20px;margin-bottom:14px}
  .ring{flex:none}
  .ring .pct{font-weight:800;font-size:19px}
  .overall .meta h2{margin:0 0 2px;font-size:15px;font-weight:700}
  .overall .meta p{margin:0;font-size:13px;color:var(--muted)}
  .resetbtn{margin-left:auto;font-size:12px;color:var(--muted);font-weight:600;padding:7px 11px;border:1px solid var(--line);border-radius:9px;align-self:flex-start}
  .resetbtn:hover{color:var(--bad);border-color:var(--bad)}

  .cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
  .cat{padding:15px 16px;text-align:left;border-radius:14px;border:1px solid var(--line);background:var(--surface);box-shadow:var(--shadow);transition:transform .12s,box-shadow .12s}
  .cat:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(27,36,48,.12)}
  .cat:active{transform:translateY(0)}
  .cat .tab{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding:3px 9px;border-radius:999px}
  .cat .nm{font-size:15px;font-weight:700;margin:9px 0 3px}
  .cat .st{font-size:12.5px;color:var(--muted);font-weight:500}
  .cat .bar{height:6px;border-radius:99px;background:var(--surface-2);margin-top:10px;overflow:hidden}
  .cat .bar i{display:block;height:100%;border-radius:99px;transition:width .4s}

  .actions{display:grid;gap:10px}
  .act{display:flex;align-items:center;gap:13px;padding:15px 16px;text-align:left;width:100%}
  .act .ic{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;font-size:18px;background:var(--surface-2)}
  .act .tx b{display:block;font-size:14.5px;font-weight:700}
  .act .tx span{font-size:12.5px;color:var(--muted)}
  .act .ar{margin-left:auto;color:var(--muted);font-size:20px}
  .act:hover{border-color:var(--accent)}
  .act.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .act.primary .ic{background:rgba(255,255,255,.18)}
  .act.primary .tx span,.act.primary .ar{color:rgba(255,255,255,.8)}

  /* Quiz */
  .qbar{display:flex;align-items:center;gap:12px;margin:2px 2px 16px}
  .back{font-size:14px;font-weight:600;color:var(--muted);padding:8px 12px;border-radius:10px}
  .back:hover{background:var(--surface);color:var(--ink)}
  .prog{flex:1;height:8px;background:var(--surface);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .prog i{display:block;height:100%;background:var(--accent);transition:width .3s}
  .score{font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap}

  .card{padding:22px 20px}
  .qhead{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .badge{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:#fff;padding:3px 10px;border-radius:999px}
  .qnum{font-size:12.5px;color:var(--muted);font-weight:600}
  .star{margin-left:auto;font-size:20px;line-height:1;color:var(--line)}
  .star.on{color:#f0a500}
  .qtext{font-size:17px;font-weight:600;letter-spacing:-.01em;margin:0 0 18px}
  .opts{display:grid;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;padding:13px 15px;border:1.5px solid var(--line);border-radius:13px;background:var(--surface);transition:border-color .12s,background .12s;width:100%;font-size:14.5px;font-weight:500}
  .opt:hover:not(:disabled){border-color:var(--accent)}
  .opt .key{flex:none;width:24px;height:24px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;font-weight:800;font-size:12.5px;color:var(--muted);text-transform:uppercase}
  .opt.correct{border-color:var(--ok);background:var(--okbg)}
  .opt.correct .key{background:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--badbg)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}

  .explain{margin-top:16px;border-top:1px dashed var(--line);padding-top:15px;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .verdict{font-weight:800;font-size:14px;margin-bottom:10px}
  .verdict.y{color:var(--ok)} .verdict.n{color:var(--bad)}
  .ex{font-size:13.5px;margin:0 0 10px}
  .ex b{font-weight:700}
  .tip{font-size:13.5px;background:#fff8e6;border:1px solid #f3e2b0;border-radius:11px;padding:11px 13px;font-style:italic}
  .tip b{font-style:normal;font-weight:700;color:#9a6b00}

  .qfoot{display:flex;gap:10px;margin-top:18px}
  .btn{flex:1;padding:14px;border-radius:13px;font-weight:700;font-size:15px;background:var(--accent);color:#fff;text-align:center;box-shadow:var(--shadow)}
  .btn:hover{filter:brightness(1.07)} .btn:active{transform:translateY(1px)}
  .btn.ghost{flex:none;background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .kbdhint{text-align:center;font-size:11.5px;color:var(--muted);margin-top:12px}

  /* Done screen */
  .done{padding:30px 22px;text-align:center}
  .done .big{font-size:42px;font-weight:800;letter-spacing:-.02em}
  .done .lbl{color:var(--muted);font-size:14px;margin-bottom:18px}
  .done .row{display:flex;gap:10px;justify-content:center}

  /* Browse */
  .search{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:13px;font-size:14.5px;font-family:inherit;background:var(--surface);margin-bottom:6px}
  .search:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent)}
  .filterrow{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 14px}
  .chip{font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .blist{display:grid;gap:8px}
  .brow{padding:13px 15px;text-align:left;border:1px solid var(--line);border-radius:12px;background:var(--surface);width:100%}
  .brow:hover{border-color:var(--accent)}
  .brow .bh{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .dot{width:9px;height:9px;border-radius:99px;flex:none}
  .brow .bn{font-size:11.5px;font-weight:700;color:var(--muted)}
  .brow .ck{margin-left:auto;font-size:13px;font-weight:700}
  .brow .bq{font-size:13.5px;font-weight:500;color:var(--ink)}
  .ans-rev{margin-top:8px;font-size:13px;color:var(--ok);font-weight:600}
  .count{font-size:12.5px;color:var(--muted);margin:0 2px 10px;font-weight:500}

  @media(max-width:480px){
    .cats{grid-template-columns:1fr}
    .qtext{font-size:16px}
    .wrap{padding:14px 12px 56px}
  }
</style>

<div class="wrap">
  <div class="top">
    <div class="logo">398</div>
    <div>
      <h1>Ôn thi Tin học văn phòng</h1>
      <p>398 câu trắc nghiệm · Word · Excel · Access</p>
    </div>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="panel overall">
      <div class="ring">
        <svg width="74" height="74" viewBox="0 0 74 74">
          <circle cx="37" cy="37" r="31" fill="none" stroke="var(--surface-2)" stroke-width="8"/>
          <circle id="ringFill" cx="37" cy="37" r="31" fill="none" stroke="var(--ok)" stroke-width="8"
            stroke-linecap="round" stroke-dasharray="195" stroke-dashoffset="195" transform="rotate(-90 37 37)"/>
          <text id="ringPct" class="pct" x="37" y="43" text-anchor="middle" fill="var(--ink)">0%</text>
        </svg>
      </div>
      <div class="meta">
        <h2 id="ovTitle">Bắt đầu nào!</h2>
        <p id="ovSub">Bạn đã thuộc 0 / 398 câu</p>
      </div>
      <button class="resetbtn" id="resetBtn">Đặt lại</button>
    </div>

    <div class="cats" id="cats"></div>

    <div class="actions">
      <button class="act primary panel" data-mode="smart">
        <span class="ic">🎯</span>
        <span class="tx"><b>Luyện thông minh</b><span>Ưu tiên câu chưa thuộc & hay sai</span></span>
        <span class="ar">›</span>
      </button>
      <button class="act panel" data-mode="all">
        <span class="ic">📚</span>
        <span class="tx"><b>Luyện toàn bộ theo thứ tự</b><span>Lần lượt 398 câu từ đầu</span></span>
        <span class="ar">›</span>
      </button>
      <button class="act panel" data-mode="shuffle">
        <span class="ic">🔀</span>
        <span class="tx"><b>Trộn ngẫu nhiên</b><span>Xáo trộn toàn bộ câu hỏi</span></span>
        <span class="ar">›</span>
      </button>
      <button class="act panel" data-mode="wrong">
        <span class="ic">🔁</span>
        <span class="tx"><b>Ôn lại câu sai & đánh dấu</b><span id="wrongCount">Chưa có câu nào</span></span>
        <span class="ar">›</span>
      </button>
      <button class="act panel" id="browseBtn">
        <span class="ic">🔎</span>
        <span class="tx"><b>Tra cứu & xem đáp án</b><span>Tìm theo số câu hoặc từ khoá</span></span>
        <span class="ar">›</span>
      </button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="hide">
    <div class="qbar">
      <button class="back" id="quizBack">‹ Thoát</button>
      <div class="prog"><i id="progFill"></i></div>
      <div class="score" id="scoreLbl">0/0</div>
    </div>
    <div class="panel card" id="qcard"></div>
    <div class="kbdhint">Phím tắt: <b>1–4</b> hoặc <b>A–D</b> để chọn · <b>Enter</b> câu tiếp · <b>S</b> đánh dấu</div>
  </div>

  <!-- BROWSE -->
  <div id="browse" class="hide">
    <div class="qbar"><button class="back" id="browseBack">‹ Về trang chính</button></div>
    <input class="search" id="searchInput" placeholder="Tìm số câu (vd: 137) hoặc từ khoá (vd: Bookmark)…">
    <div class="filterrow" id="filterRow"></div>
    <p class="count" id="browseCount"></p>
    <div class="blist" id="blist"></div>
  </div>
</div>

const CATS = {
  Word:  {color:'var(--word)',  hex:'#2b579a'},
  Excel: {color:'var(--excel)', hex:'#217346'},
  Access:{color:'var(--access)',hex:'#a4373a'},
  'Khác':{color:'var(--khac)',  hex:'#5c6b7a'},
};
const $ = s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

/* ---------- persistent state ---------- */
let state = { mastered:{}, wrong:{}, marked:{}, seen:{} }; // keyed by question num
const KEY='thvp398_v1';

async function loadState(){
  try{
    const r = await window.storage.get(KEY);
    if(r && r.value) state = Object.assign(state, JSON.parse(r.value));
  }catch(e){ /* no saved state yet, or storage unavailable */ }
}
let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{ await window.storage.set(KEY, JSON.stringify(state)); }catch(e){}
  },150);
}

/* ---------- views ---------- */
function show(id){
  ['home','quiz','browse'].forEach(v=>$('#'+v).classList.toggle('hide',v!==id));
  window.scrollTo(0,0);
}

/* ---------- dashboard ---------- */
function renderHome(){
  const total = DATA.length;
  const done = DATA.filter(q=>state.mastered[q.num]).length;
  const pct = Math.round(done/total*100);
  const C=195, off = C - C*done/total;
  $('#ringFill').setAttribute('stroke-dashoffset', off);
  $('#ringPct').textContent = pct+'%';
  $('#ovSub').textContent = `Bạn đã thuộc ${done} / ${total} câu`;
  $('#ovTitle').textContent = pct===0?'Bắt đầu nào!':pct===100?'Hoàn thành! 🎉':pct>=70?'Sắp xong rồi!':'Đang tiến bộ tốt';

  const wrongN = Object.keys(state.wrong).filter(n=>state.wrong[n]).length
               + Object.keys(state.marked).filter(n=>state.marked[n] && !state.wrong[n]).length;
  $('#wrongCount').textContent = wrongN? `${wrongN} câu cần ôn lại` : 'Chưa có câu nào';

  const cats = $('#cats'); cats.innerHTML='';
  for(const name of Object.keys(CATS)){
    const qs = DATA.filter(q=>q.cat===name);
    if(!qs.length) continue;
    const m = qs.filter(q=>state.mastered[q.num]).length;
    const p = Math.round(m/qs.length*100);
    const c = CATS[name].color;
    const b = el('button','cat');
    b.innerHTML = `<span class="tab" style="background:${c}">${name}</span>
      <div class="nm">${name==='Khác'?'Câu khác':'Microsoft '+name}</div>
      <div class="st">${m}/${qs.length} câu · ${p}%</div>
      <div class="bar"><i style="width:${p}%;background:${c}"></i></div>`;
    b.onclick=()=>startQuiz({mode:'cat',cat:name});
    cats.appendChild(b);
  }
}

/* ---------- quiz engine ---------- */
let session=null;

function buildQueue(opt){
  let qs;
  if(opt.mode==='cat') qs = DATA.filter(q=>q.cat===opt.cat);
  else if(opt.mode==='wrong') qs = DATA.filter(q=>state.wrong[q.num]||state.marked[q.num]);
  else qs = DATA.slice();

  if(opt.mode==='shuffle') shuffle(qs);
  if(opt.mode==='smart'){
    // unseen first, then wrong/marked, then the rest; light shuffle within tiers
    const unseen = qs.filter(q=>!state.seen[q.num]);
    const wrong  = qs.filter(q=>state.seen[q.num] && (state.wrong[q.num]||state.marked[q.num]));
    const rest   = qs.filter(q=>state.seen[q.num] && !state.wrong[q.num] && !state.marked[q.num] && !state.mastered[q.num]);
    [unseen,wrong,rest].forEach(shuffle);
    qs = [...unseen,...wrong,...rest];
    if(!qs.length) qs = DATA.slice(); // everything mastered -> review all
  }
  return qs;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}}

function startQuiz(opt){
  const queue = buildQueue(opt);
  if(!queue.length){ alert('Không có câu nào trong nhóm này.'); return; }
  session={queue,i:0,correct:0,answered:0,opt};
  show('quiz');
  renderQ();
}

function renderQ(){
  const s=session, q=s.queue[s.i];
  state.seen[q.num]=1;
  const c=CATS[q.cat].color;
  $('#progFill').style.width = (s.i/s.queue.length*100)+'%';
  $('#scoreLbl').textContent = `${s.correct}/${s.answered}`;

  const card=$('#qcard'); card.innerHTML='';
  const head=el('div','qhead',
    `<span class="badge" style="background:${c}">${q.cat}</span>
     <span class="qnum">Câu ${q.num} · ${s.i+1}/${s.queue.length}</span>
     <button class="star ${state.marked[q.num]?'on':''}" id="starBtn" title="Đánh dấu (S)">${state.marked[q.num]?'★':'☆'}</button>`);
  card.appendChild(head);
  card.appendChild(el('p','qtext',escapeH(q.q)));

  const opts=el('div','opts');
  for(const k of ['a','b','c','d']){
    const o=el('button','opt');
    o.dataset.k=k;
    o.innerHTML=`<span class="key">${k}</span><span>${escapeH(q.options[k])}</span>`;
    o.onclick=()=>answer(k);
    opts.appendChild(o);
  }
  card.appendChild(opts);

  $('#starBtn').onclick=toggleMark;
  s.locked=false;
}

function answer(k){
  const s=session; if(s.locked) return; s.locked=true;
  const q=s.queue[s.i];
  const correct=q.answer.toLowerCase();
  const isRight = k===correct;
  s.answered++;
  if(isRight){ s.correct++; }

  // update mastery model
  if(isRight){
    delete state.wrong[q.num];
    state.mastered[q.num]=1;          // got it right -> mark mastered
  }else{
    state.wrong[q.num]=1;
    delete state.mastered[q.num];     // missed -> not mastered yet
  }
  saveState();

  document.querySelectorAll('.opt').forEach(o=>{
    o.disabled=true;
    if(o.dataset.k===correct) o.classList.add('correct');
    if(o.dataset.k===k && !isRight) o.classList.add('wrong');
  });

  const q2=q;
  const ex=el('div','explain');
  ex.innerHTML=`
    <div class="verdict ${isRight?'y':'n'}">${isRight?'✓ Chính xác!':'✗ Chưa đúng · Đáp án: '+q.answer}</div>
    <p class="ex"><b>Giải thích: </b>${escapeH(q2.explain)}</p>
    ${q2.tip?`<div class="tip"><b>Mẹo khoanh: </b>${escapeH(q2.tip)}</div>`:''}
    <div class="qfoot">
      <button class="btn" id="nextBtn">${s.i+1>=s.queue.length?'Xem kết quả':'Câu tiếp ›'}</button>
    </div>`;
  $('#qcard').appendChild(ex);
  $('#nextBtn').onclick=next;
  $('#scoreLbl').textContent=`${s.correct}/${s.answered}`;
}

function next(){
  const s=session;
  if(s.i+1>=s.queue.length){ finish(); return; }
  s.i++; renderQ();
}

function toggleMark(){
  const q=session.queue[session.i];
  if(state.marked[q.num]) delete state.marked[q.num]; else state.marked[q.num]=1;
  saveState();
  const b=$('#starBtn');
  b.classList.toggle('on',!!state.marked[q.num]);
  b.textContent=state.marked[q.num]?'★':'☆';
}

function finish(){
  const s=session;
  const pct=s.answered?Math.round(s.correct/s.answered*100):0;
  show('quiz');
  $('#progFill').style.width='100%';
  const card=$('#qcard'); card.className='panel done';
  card.innerHTML=`
    <div class="big">${s.correct}<span style="color:var(--muted);font-size:24px">/${s.answered}</span></div>
    <div class="lbl">Đúng ${pct}% · phiên này</div>
    <div class="row">
      <button class="btn" id="againBtn" style="flex:none;padding:13px 22px">Luyện tiếp</button>
      <button class="btn ghost" id="homeBtn" style="padding:13px 22px">Trang chính</button>
    </div>`;
  $('#againBtn').onclick=()=>startQuiz(s.opt);
  $('#homeBtn').onclick=goHome;
}

function goHome(){ session=null; renderHome(); show('home'); }

/* keyboard */
document.addEventListener('keydown',e=>{
  if($('#quiz').classList.contains('hide')) return;
  if(!session) return;
  const map={'1':'a','2':'b','3':'c','4':'d','a':'a','b':'b','c':'c','d':'d'};
  const k=e.key.toLowerCase();
  if(!session.locked && map[k]){ e.preventDefault(); answer(map[k]); }
  else if(session.locked && (e.key==='Enter'||e.key===' ')){ e.preventDefault(); const n=$('#nextBtn');const a=$('#againBtn'); (n||a)?.click(); }
  else if(k==='s' && !$('#starBtn')?.classList.contains('hide') && $('#starBtn')){ e.preventDefault(); toggleMark(); }
});

/* ---------- browse ---------- */
let bFilter='Tất cả';
function renderBrowse(){
  const fr=$('#filterRow'); fr.innerHTML='';
  ['Tất cả','Word','Excel','Access','Khác','★ Đánh dấu'].forEach(f=>{
    const c=el('button','chip'+(f===bFilter?' on':''),f);
    c.onclick=()=>{bFilter=f;renderBrowse();};
    fr.appendChild(c);
  });
  const term=$('#searchInput').value.trim().toLowerCase();
  let list=DATA.slice();
  if(bFilter==='★ Đánh dấu') list=list.filter(q=>state.marked[q.num]);
  else if(bFilter!=='Tất cả') list=list.filter(q=>q.cat===bFilter);
  if(term){
    const numTerm=term.replace(/[^0-9]/g,'');
    list=list.filter(q=>{
      if(numTerm && String(q.num)===numTerm) return true;
      const hay=(q.q+' '+Object.values(q.options).join(' ')+' '+q.explain+' '+q.tip).toLowerCase();
      return hay.includes(term);
    });
  }
  $('#browseCount').textContent=`${list.length} câu`;
  const bl=$('#blist'); bl.innerHTML='';
  list.slice(0,300).forEach(q=>{
    const c=CATS[q.cat];
    const row=el('button','brow');
    const mk=state.mastered[q.num]?'<span class="ck" style="color:var(--ok)">✓ thuộc</span>'
            :state.marked[q.num]?'<span class="ck" style="color:#f0a500">★</span>':'';
    row.innerHTML=`<div class="bh"><span class="dot" style="background:${c.hex}"></span>
       <span class="bn">Câu ${q.num} · ${q.cat}</span>${mk}</div>
       <div class="bq">${escapeH(q.q)}</div>
       <div class="ans-rev hide">Đáp án ${q.answer}: ${escapeH(q.options[q.answer.toLowerCase()])}<br><span style="color:var(--muted);font-weight:500">${escapeH(q.explain)}</span></div>`;
    row.onclick=()=>row.querySelector('.ans-rev').classList.toggle('hide');
    bl.appendChild(row);
  });
  if(list.length>300){
    bl.appendChild(el('p','count','Hiện 300 câu đầu — gõ thêm từ khoá để thu hẹp.'));
  }
}
function escapeH(s){return (s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

/* ---------- wire up ---------- */
document.querySelectorAll('.act[data-mode]').forEach(b=>{
  b.onclick=()=>{
    const m=b.dataset.mode;
    if(m==='wrong'){
      const any=DATA.some(q=>state.wrong[q.num]||state.marked[q.num]);
      if(!any){ alert('Chưa có câu sai hay câu đánh dấu nào. Hãy luyện vài câu trước nhé!'); return; }
    }
    startQuiz({mode:m});
  };
});
$('#browseBtn').onclick=()=>{show('browse');renderBrowse();};
$('#browseBack').onclick=goHome;
$('#quizBack').onclick=goHome;
$('#searchInput').addEventListener('input',renderBrowse);
$('#resetBtn').onclick=async()=>{
  if(!confirm('Đặt lại toàn bộ tiến độ học (thuộc / sai / đánh dấu)?')) return;
  state={mastered:{},wrong:{},marked:{},seen:{}};
  try{ await window.storage.set(KEY, JSON.stringify(state)); }catch(e){}
  renderHome();
};

(async()=>{ await loadState(); renderHome(); show('home'); })();
</script>
